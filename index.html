<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixel Crate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
        }
        #ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div id="ad-container">
    <video id="ad-video" autoplay muted playsinline>
        <source src="ad.mp4" type="video/mp4">
    </video>
</div>

<script>
let gameStarted = false;

function openGame() {
    if (gameStarted) return;
    gameStarted = true;

    // Open in new tab
    const win = window.open("game.html", "_blank");

    // Attempt fullscreen (only works if browser allows)
    if (win) {
        try {
            win.focus();
        } catch (e) {}
    }
}

window.SDK_OPTIONS = {
   gameId: "38hq4lnuk5njkl05w3i9txs5yuvzylcl",
   onEvent: function (a) {
      switch (a.name) {
         case "SDK_GAME_START":
            openGame();
            break;
         case "SDK_READY":
            console.log("SDK_READY");
            break;
         default:
            console.log("SDK event:", a.name);
            break;
      }
   }
};

(function (a, b, c) {
   var d = a.getElementsByTagName(b)[0];
   if (!a.getElementById(c)) {
       var s = a.createElement(b);
       s.id = c;
       s.src = "https://api.gamemonetize.com/sdk.js";
       d.parentNode.insertBefore(s, d);
   }
})(document, "script", "gamemonetize-sdk");

window.onload = function() {
    const video = document.getElementById("ad-video");

    // Fallback if SDK doesn't trigger
    video.onended = openGame;

    // Optional: safety timeout (uncomment if needed)
    // setTimeout(openGame, 8000);

    if (typeof sdk !== "undefined") {
        sdk.showBanner();
    }
};
</script>

</body>
</html>

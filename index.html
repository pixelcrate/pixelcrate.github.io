<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <script>
        window.addEventListener('beforeunload', function (event) {
            event.preventDefault()
            event.returnValue = ''
            return 'Are you sure you want to leave? Any unsaved changes will be lost.'
        })
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || []
        function gtag() { dataLayer.push(arguments) }
        gtag('js', new Date())
        gtag('config', 'G-XXXXXXX')
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelCrate</title>
    <meta name="description" content="Explore fun, unblocked games on PixelCrate. Fast, free, no downloads—perfect for school or home." />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#fb2651" />
    <script>
        (() => {
            const k = "p", d = 15e4, s = () => {
                let t = localStorage.getItem(k);
                return !t || Date.now() - t > d;
            }, m = () => localStorage.setItem(k, Date.now());
            function h() {
                if (!s()) return;
                m();
                document.removeEventListener("click", h);
            }
            s() && document.addEventListener("click", h, { once: 1 })
        })();
    </script>
</head>
<body class="dark-mode">
<header>
    <div class="header-content">
        <div class="logo">PixelCrate</div>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search games..." oninput="filterGames()" />
            <select id="sortOptions" onchange="sortGames()">
                <option value="name">Name</option>
                <option value="id">ID (Date)</option>
                <option value="popular">Popular</option>
            </select>
        </div>
        <div class="control-buttons">
            <button id="refresh" class="control-button" title="Refresh the games list" onclick="listGames()">
                <img src="refresh-icon.png" alt="refresh" />
            </button>
            <button id="settings" class="control-button" title="Settings!">
                <img src="setting.png" alt="settings" />
            </button>
        </div>
    </div>
</header>

<main>
    <details id="featuredGamesWrapper" open>
        <summary id="featuredGamesSummary">Featured Games</summary>
        <div id="featuredGames" class="game-container"></div>
    </details>
    <br />
    <hr />
    <br />
    <details id="allGamesWrapper" open>
        <summary id="allSummary">All Games</summary>
        <div id="gameContainer">Loading...</div>
    </details>
</main>

<div id="gameViewer">
    <div class="game-header">
        <div class="game-title">
            <h2 id="gameName">Game Title</h2>
            <button class="info-button" onclick="showGameInfo()">Info</button>
        </div>
        <div class="game-controls">
            <button onclick="fullscreenGame()">Fullscreen</button>
            <button onclick="openInNewTab()">Open in New Tab</button>
            <button onclick="downloadGame()">Download</button>
            <button onclick="closeGame()">Close</button>
        </div>
    </div>
    <iframe id="gameFrame"></iframe>
</div>

<footer>
    <div class="footer-links">
        <a href="#" onclick="showDMCA()">DMCA</a>
        <a href="#" onclick="showContact()">Contact</a>
        <a href="#" onclick="showPrivacy()">Privacy Policy</a>
    </div>
</footer>

<script src="main.js"></script>
<script>
    navigator.serviceWorker.register(location.protocol + '//' + location.hostname + '/sw.js')
</script>
</body>
</html>
